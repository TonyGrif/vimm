[project]
name = "vimm"
version = "0.0.1"
description = "Scraper for the vimm.net website"
readme = "README.md"
requires-python = ">=3.9"

[dependency-groups]
dev = [
    "isort>=5.13.2",
    "mypy>=1.13.0",
    "poethepoet>=0.30.0",
    "pylint>=3.3.1",
    "pytest>=8.3.3",
    "pytest-cov>=6.0.0",
    "ruff>=0.8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.poe.tasks]
test = "pytest --cov --cov-report term-missing"
_format = "ruff format vimm/"
_import = "ruff check --fix vimm/"
format = ["_format", "_import"]
_type = "mypy vimm/"
_pylint = "pylint vimm/"
_check = "ruff check vimm/"
lint = ["_check", "_type", "_pylint"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vimm/"]
