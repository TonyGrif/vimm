[project]
name = "vimm"
version = "0.0.1"
description = "Scraper for the vimm.net website"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "beautifulsoup4>=4.12.3",
    "httpx>=0.27.2",
]

[dependency-groups]
dev = [
    "isort>=5.13.2",
    "mypy>=1.13.0",
    "poethepoet>=0.30.0",
    "pylint>=3.3.1",
    "pytest>=8.3.3",
    "pytest-cov>=6.0.0",
    "ruff>=0.8.0",
    "types-beautifulsoup4>=4.12.0.20241020",
    "pdoc>=15.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.poe.tasks]
test = "pytest --cov --cov-report term-missing"
_format = "ruff format scripts/ vault/"
_import = "ruff check --fix scripts/ vault/"
format = ["_format", "_import"]
_type = "mypy scripts/ vault/"
_pylint = "pylint scripts/ vault/"
_check = "ruff check scripts/ vault/"
lint = ["_check", "_type", "_pylint"]
docs = "pdoc -d google vault/"
pubdocs = "pdoc -d google vault/ -o docs/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vault/"]
